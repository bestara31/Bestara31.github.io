<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; overflow: hidden; font-family: sans-serif; }
        .nft-container { position: relative; width: 90vw; height: 90vw; max-width: 500px; max-height: 500px; border-radius: 20px; overflow: hidden; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; }
        
        /* Foto Gadis */
        img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Efek saat disentuh/klik */
        .nft-container:active img { transform: scale(1.2) rotate(3deg); filter: brightness(1.2) contrast(1.1); }
        
        /* Overlay Teks */
        .overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.4); color: white; text-align: center; padding: 10px 0; backdrop-filter: blur(5px); pointer-events: none; }
    </style>
</head>
<body>

    <div class="nft-container" onclick="tambahEfek()">
        <!-- GANTI URL DI BAWAH DENGAN LINK FOTO GADIS KAMU -->
        <img id="fotoGadis" src="https://images.unsplash.com" alt="Gadis Cantik">
        
        <div class="overlay">Sentuh Aku ✨</div>
    </div>

    <script>
        function tambahEfek() {
            // Logika tambahan jika ingin suara atau partikel bisa ditaruh di sini
            console.log("NFT Disentuh!");
        }
    </script>
</body>
</html>
