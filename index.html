<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; }
        svg { width: 90vw; height: 90vw; cursor: pointer; touch-action: none; }
        .bola { transition: all 0.3s ease; }
    </style>
</head>
<body>

    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org" onclick="ubahWarna()">
        <!-- Efek Cahaya Belakang -->
        <defs>
            <radialGradient id="glow">
                <stop offset="0%" stop-color="white" stop-opacity="0.3" />
                <stop offset="100%" stop-color="transparent" />
            </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="45" fill="url(#glow)" />
        
        <!-- Objek Utama -->
        <circle id="nftCircle" class="bola" cx="50" cy="50" r="30" fill="#6fbcf0" stroke="#fff" stroke-width="2">
            <animate id="pulse" attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite" />
        </circle>
        
        <text x="50" y="55" font-family="Arial" font-size="5" text-anchor="middle" fill="white">SENTUH SAYA</text>
    </svg>

    <script>
        function ubahWarna() {
            const colors = ['#6fbcf0', '#f06fb1', '#9df06f', '#f0d36f', '#ffffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const circle = document.getElementById('nftCircle');
            
            // Ubah warna dan ukuran saat disentuh
            circle.setAttribute('fill', randomColor);
            circle.setAttribute('r', '38');
            setTimeout(() => circle.setAttribute('r', '30'), 200);
        }
    </script>
</body>
</html>
