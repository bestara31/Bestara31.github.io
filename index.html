<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Saver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 80%;
      padding: 10px;
      margin-right: 5px;
    }
    button {
      padding: 10px;
      cursor: pointer;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    a {
      text-decoration: none;
      color: blue;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔖 Simpan Link</h1>

  <input type="text" id="linkInput" placeholder="Masukkan URL...">
  <button onclick="addLink()">Simpan</button>

  <ul id="linkList"></ul>
</div>

<script>
  let links = JSON.parse(localStorage.getItem('links')) || [];

  function renderLinks() {
    const list = document.getElementById('linkList');
    list.innerHTML = '';

    links.forEach((link, index) => {
      const li = document.createElement('li');

      li.innerHTML = `
        <a href="${link}" target="_blank">${link}</a>
        <button onclick="deleteLink(${index})">Hapus</button>
      `;

      list.appendChild(li);
    });
  }

  function addLink() {
    const input = document.getElementById('linkInput');
    const url = input.value.trim();

    if (!url) {
      alert('Masukkan link dulu!');
      return;
    }

    links.push(url);
    localStorage.setItem('links', JSON.stringify(links));

    input.value = '';
    renderLinks();
  }

  function deleteLink(index) {
    links.splice(index, 1);
    localStorage.setItem('links', JSON.stringify(links));
    renderLinks();
  }

  renderLinks();
</script>

</body>
</html>
